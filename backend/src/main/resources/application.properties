spring.application.name=ecommerce-backend

# Server Configuration
server.servlet.context-path=${SERVER_CONTEXT_PATH:/backend}
server.port=${PORT:8080}

# Database Configuration (Network Deployment)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://10.180.186.74:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
jwt.secret=${JWT_SECRET:4512908f-2871-460d-85fa-7a8e7e10c7a5-very-secure-key-that-is-long-enough}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Seeding Configuration
app.admin.email=${APP_ADMIN_EMAIL:admin@enterprise.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.user.email=${APP_USER_EMAIL:user@enterprise.com}
app.user.password=${APP_USER_PASSWORD:user123}
